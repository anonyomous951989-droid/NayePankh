{% extends 'base.html' %}
{% block title %}Set New Password{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon">
                <i class="bi bi-shield-lock-fill"></i>
            </div>
            <h2>Set New Password</h2>
            <p>Create a new secure password</p>
        </div>

        <form method="post" id="password-reset-confirm-form">
            {% csrf_token %}
            <div class="mb-3">
                <label for="new-password1" class="form-label">New Password</label>
                <input type="password" class="form-control" name="password1" id="new-password1" placeholder="New Password" required minlength="8">
            </div>
            <div class="mb-3">
                <label for="new-password2" class="form-label">Confirm New Password</label>
                <input type="password" class="form-control" name="password2" id="new-password2" placeholder="Confirm Password" required minlength="8">
            </div>
            <button type="submit" class="btn btn-auth">
                <i class="bi bi-check-circle me-1"></i> Reset Password
            </button>
        </form>

        <div class="auth-footer">
            <a href="{% url 'accounts:login' %}">Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
