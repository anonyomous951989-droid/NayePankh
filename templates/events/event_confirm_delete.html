{% extends 'base.html' %}
{% block title %}Delete Event{% endblock %}

{% block content %}
<div class="form-page">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="form-card text-center">
                    <i class="bi bi-exclamation-triangle text-danger" style="font-size: 4rem;"></i>
                    <h3 class="mt-3">Delete Event</h3>
                    <p class="text-muted">Are you sure you want to delete <strong>{{ event.title }}</strong>? This action cannot be undone.</p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex gap-2 justify-content-center">
                            <button type="submit" class="btn btn-danger"><i class="bi bi-trash me-1"></i> Delete</button>
                            <a href="{% url 'events:detail' event.pk %}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
