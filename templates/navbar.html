{% load static %}
<!-- ============================================================== -->
<!-- NAVBAR - Modern glassmorphism navigation bar -->
<!-- ============================================================== -->
<nav class="navbar navbar-expand-lg fixed-top navbar-main" id="mainNavbar">
    <div class="container">
        <!-- Brand/Logo -->
        <a class="navbar-brand d-flex align-items-center" href="{% url 'core:landing' %}">
            <div class="brand-icon me-2">
                <i class="bi bi-heart-pulse-fill"></i>
            </div>
            <span class="brand-text">
                <span class="brand-naye">Naye</span><span class="brand-pankh">Pankh</span>
            </span>
        </a>

        <!-- Mobile Toggle -->
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent" aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
            <i class="bi bi-list fs-4"></i>
        </button>

        <!-- Navbar Links -->
        <div class="collapse navbar-collapse" id="navbarContent">
            <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'core:landing' %}">
                        <i class="bi bi-house-heart me-1"></i>Home
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'core:landing' %}#about">
                        <i class="bi bi-people me-1"></i>About
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'events:list' %}">
                        <i class="bi bi-calendar-event me-1"></i>Events
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'core:landing' %}#contact">
                        <i class="bi bi-envelope me-1"></i>Contact
                    </a>
                </li>
            </ul>

            <!-- Auth Buttons -->
            <div class="navbar-actions d-flex align-items-center gap-2">
                {% if user.is_authenticated %}
                    <a href="{% url 'dashboard:home' %}" class="btn btn-outline-light btn-sm nav-btn">
                        <i class="bi bi-speedometer2 me-1"></i>Dashboard
                    </a>
                    <div class="dropdown">
                        <button class="btn btn-primary btn-sm nav-btn dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="bi bi-person-circle me-1"></i>{{ user.get_short_name|default:user.username }}
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end shadow-lg">
                            {% if user.is_staff or user.is_admin_user %}
                                <li><a class="dropdown-item" href="{% url 'dashboard:home' %}"><i class="bi bi-speedometer2 me-2"></i>Admin Panel</a></li>
                                <li><hr class="dropdown-divider"></li>
                            {% endif %}
                            <li><a class="dropdown-item" href="{% url 'volunteers:profile' %}"><i class="bi bi-person me-2"></i>My Profile</a></li>
                            <li><a class="dropdown-item" href="{% url 'dashboard:home' %}"><i class="bi bi-grid me-2"></i>Dashboard</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="{% url 'accounts:logout' %}"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
                        </ul>
                    </div>
                {% else %}
                    <a href="{% url 'accounts:login' %}" class="btn btn-outline-light btn-sm nav-btn">
                        <i class="bi bi-box-arrow-in-right me-1"></i>Login
                    </a>
                    <a href="{% url 'accounts:signup' %}" class="btn btn-primary btn-sm nav-btn btn-glow">
                        <i class="bi bi-person-plus me-1"></i>Sign Up
                    </a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>
