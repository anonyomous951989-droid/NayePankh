{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | NayePankh Foundation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="error-page">
        <div>
            <div class="error-code">404</div>
            <h2 class="mb-3">Page Not Found</h2>
            <p class="text-muted mb-4" style="color: rgba(255,255,255,0.6) !important;">The page you're looking for doesn't exist or has been moved.</p>
            <a href="/" class="btn btn-hero-primary"><i class="bi bi-house me-1"></i> Go Home</a>
        </div>
    </div>
</body>
</html>
